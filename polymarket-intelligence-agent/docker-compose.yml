services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: polymarket-intelligence-app
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-file:/app/data/polymarket.db}
      ELIZA_AGENT_URL: ${ELIZA_AGENT_URL:-http://host.docker.internal:3001}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Polymarket Intelligence Agent}
      POLYMARKET_MOCK_MODE: ${POLYMARKET_MOCK_MODE:-false}
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - polymarket_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  polymarket_data:
