name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    paths:
      - "agent/**"
      - "polymarket-intelligence-agent/**"
      - "docker/**"
      - "Dockerfile"
      - "Dockerfile.fullstack"
      - ".dockerignore"
  workflow_dispatch:
    inputs:
      push_latest:
        description: "Also push latest tag"
        required: false
        default: true
        type: boolean
      image_tag:
        description: "Optional extra image tag (for example: rc-1)"
        required: false
        default: ""
        type: string
      fallback_model:
        description: "OpenRouter fallback model id used in rendered Nosana job"
        required: false
        default: "anthropic/claude-3-haiku"
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Prepare image tags
        id: prep
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_LATEST: ${{ github.event.inputs.push_latest || 'true' }}
          EXTRA_TAG: ${{ github.event.inputs.image_tag || '' }}
        run: |
          TAGS="pwilson99/nosana-eliza-agent:${GITHUB_SHA}"

          if [[ "${EVENT_NAME}" == "push" || "${PUSH_LATEST}" == "true" ]]; then
            TAGS+=$'\n'"pwilson99/nosana-eliza-agent:latest"
          fi

          if [[ -n "${EXTRA_TAG}" ]]; then
            TAGS+=$'\n'"pwilson99/nosana-eliza-agent:${EXTRA_TAG}"
          fi

          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.fullstack
          push: true
          tags: ${{ steps.prep.outputs.tags }}
          build-args: |
            OPENAI_BASE_URL=https://5i8frj7ann99bbw9gzpprvzj2esugg39hxbb4unypskq.node.k8s.prd.nos.ci/v1
            OPENAI_SMALL_MODEL=Qwen3.5-9B-FP8
            OPENAI_LARGE_MODEL=Qwen3.5-9B-FP8
            MODEL_NAME=Qwen3.5-9B-FP8
            OPENROUTER_FALLBACK_MODEL=${{ github.event.inputs.fallback_model || 'anthropic/claude-3-haiku' }}
          secrets: |
            openrouter_key=${{ secrets.OPENROUTER_API_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
