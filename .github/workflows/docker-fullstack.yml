name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    paths:
      - "agent/**"
      - "polymarket-intelligence-agent/**"
      - "docker/**"
      - "Dockerfile"
      - "Dockerfile.fullstack"
      - ".dockerignore"
  workflow_dispatch:
    inputs:
      push_latest:
        description: "Also push latest tag"
        required: false
        default: true
        type: boolean
      image_tag:
        description: "Optional extra image tag (for example: rc-1)"
        required: false
        default: ""
        type: string
      fallback_model:
        description: "OpenRouter fallback model id used in rendered Nosana job"
        required: false
        default: "anthropic/claude-3-haiku"
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Prepare image tags
        id: prep
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_LATEST: ${{ github.event.inputs.push_latest || 'true' }}
          EXTRA_TAG: ${{ github.event.inputs.image_tag || '' }}
        run: |
          TAGS="pwilson99/nosana-eliza-agent:${GITHUB_SHA}"

          if [[ "${EVENT_NAME}" == "push" || "${PUSH_LATEST}" == "true" ]]; then
            TAGS+=$'\n'"pwilson99/nosana-eliza-agent:latest"
          fi

          if [[ -n "${EXTRA_TAG}" ]]; then
            TAGS+=$'\n'"pwilson99/nosana-eliza-agent:${EXTRA_TAG}"
          fi

          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.fullstack
          push: true
          tags: ${{ steps.prep.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Render deploy-ready Nosana job file
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_FALLBACK_MODEL: ${{ github.event.inputs.fallback_model || 'anthropic/claude-3-haiku' }}
          IMAGE_REF: pwilson99/nosana-eliza-agent:${{ github.sha }}
        run: |
          mkdir -p dist

          if [[ -n "${OPENROUTER_API_KEY}" ]]; then
            jq \
              --arg key "${OPENROUTER_API_KEY}" \
              --arg model "${OPENROUTER_FALLBACK_MODEL}" \
              --arg image "${IMAGE_REF}" \
              '.ops[0].args.image = $image | .ops[0].args.env.OPENROUTER_API_KEY = $key | .ops[0].args.env.OPENROUTER_FALLBACK_MODEL = $model' \
              nos_job_def/nosana_fullstack_job_definition.json \
              > dist/nosana_fullstack_job_definition.rendered.json
          else
            jq \
              --arg image "${IMAGE_REF}" \
              '.ops[0].args.image = $image' \
              nos_job_def/nosana_fullstack_job_definition.json \
              > dist/nosana_fullstack_job_definition.rendered.json
            echo "OPENROUTER_API_KEY not set; rendered job excludes OpenRouter fallback key."
          fi

      - name: Upload rendered Nosana job artifact
        uses: actions/upload-artifact@v4
        with:
          name: nosana-fullstack-job-definition
          path: dist/nosana_fullstack_job_definition.rendered.json
